global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "nextjs"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["frontend:3000"]

  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]